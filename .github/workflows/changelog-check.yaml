name: Check changelog helpers

on:
  pull_request:
    paths:
      - ".github/scripts/changelog.py"
      - ".github/scripts/discord-notify.py"
      - ".github/scripts/test_changelog.py"
      - ".github/scripts/requirements.txt"
      - ".github/workflows/changelog-check.yaml"

permissions:
  contents: read

jobs:
  check:
    name: Check changelog helpers
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install changelog dependencies
        run: python -m pip install --requirement .github/scripts/requirements.txt

      - name: Test changelog helpers
        run: python .github/scripts/test_changelog.py
