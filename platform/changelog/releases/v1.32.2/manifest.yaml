created: 2026-05-14
title: Security updates and chart fixes
intro: >-
  This release upgrades frontend, backend, and CLI dependencies, along with the tenzir-seaweed
  base image, to address known vulnerabilities reported by our container scanner.
  It also fixes two chart issues: tooltips no longer get clipped in small dashboard
  cells, and charts no longer zoom unexpectedly on click.
