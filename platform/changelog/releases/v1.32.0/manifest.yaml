created: 2026-05-07
title: Stream timeline and table navigation
intro: >-
  This release adds a timeline to the Stream view that visualizes event volume over
  time, segmented by schema, with automatic timestamp detection. The Explorer's table
  view also gains keyboard navigation between entries and a streamlined Fields popover
  for quicker field selection.
