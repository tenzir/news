title: Tenzir Platform v1.30.0
intro: >-
  This release introduces a new Stream view in the Explorer that displays pipeline
  results as a continuous, expandable event list. It also adds a time range selector,
  sortable table columns, and copyable inspector values, alongside several bug fixes
  for package management and the library view.
