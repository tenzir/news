created: 2026-07-23
title: Two-factor authentication and diagnostics heatmap fixes
intro: >-
  This release fixes an issue that prevented users from enrolling in two-factor authentication
  with certain authentication provider configurations, most notably on app.tenzir.com.
  It also stops the diagnostics heatmap from flashing every ten seconds when the selected
  time window contains many diagnostics.
